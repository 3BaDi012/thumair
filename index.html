<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thumair | ثمير</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('darkMode');
          var isDark = raw ? JSON.parse(raw) : false;
          if (isDark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (_) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var locale = localStorage.getItem('locale');
          if (locale !== 'en') locale = 'ar';
          document.documentElement.lang = locale;
          document.documentElement.dir = locale === 'en' ? 'ltr' : 'rtl';
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
